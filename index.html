<!DOCTYPE html>
<html>
<head>
<title>Ultra Pro Trading Journal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:15px;
text-align:center;
font-size:24px;
}

.container{
padding:20px;
}

input,button{
padding:8px;
margin:5px;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
color:white;
cursor:pointer;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid gray;
padding:8px;
}

canvas{
background:white;
}

</style>
</head>

<body>

<header>
🚀 ULTRA PRO Trading Journal
</header>

<div class="container">

<h3>Add Trade</h3>

<input id="entry" placeholder="Entry">
<input id="exit" placeholder="Exit">
<input id="stop" placeholder="Stop Loss">
<input id="lot" placeholder="Lot Size">
<input id="strategy" placeholder="Strategy">

<input type="file" id="screenshot">

<button onclick="addTrade()">Save Trade</button>

<h3 id="stats"></h3>

<div class="dashboard">

<div class="card">
<h3>Equity Curve</h3>
<canvas id="equityChart"></canvas>
</div>

<div class="card">
<h3>Profit / Loss</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Win Rate</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<table>

<thead>
<tr>
<th>Entry</th>
<th>Exit</th>
<th>Stop</th>
<th>Lot</th>
<th>P/L</th>
<th>Strategy</th>
</tr>
</thead>

<tbody id="tradeTable"></tbody>

</table>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || []

let wins=0
let losses=0
let equity=0

function addTrade(){

let entry=parseFloat(document.getElementById("entry").value)
let exit=parseFloat(document.getElementById("exit").value)
let stop=parseFloat(document.getElementById("stop").value)
let lot=parseFloat(document.getElementById("lot").value)
let strategy=document.getElementById("strategy").value

let pnl=(exit-entry)*lot

let trade={entry,exit,stop,lot,pnl,strategy}

trades.push(trade)

localStorage.setItem("trades",JSON.stringify(trades))

renderTrades()

}

function renderTrades(){

let table=""
wins=0
losses=0
equity=0

let pnlArray=[]
let equityArray=[]

trades.forEach((t,i)=>{

if(t.pnl>0){wins++}else{losses++}

equity+=t.pnl

pnlArray.push(t.pnl)
equityArray.push(equity)

table+=`
<tr>
<td>${t.entry}</td>
<td>${t.exit}</td>
<td>${t.stop}</td>
<td>${t.lot}</td>
<td>${t.pnl}</td>
<td>${t.strategy}</td>
</tr>
`

})

document.getElementById("tradeTable").innerHTML=table

let total=wins+losses
let winrate= total ? ((wins/total)*100).toFixed(2) : 0

document.getElementById("stats").innerHTML=
"Total Trades: "+total+" | Win Rate: "+winrate+"% | Equity: "+equity

updateCharts(pnlArray,equityArray)

}

let equityChart=new Chart(document.getElementById("equityChart"),{
type:'line',
data:{labels:[],datasets:[{label:'Equity',data:[]}]}
})

let barChart=new Chart(document.getElementById("barChart"),{
type:'bar',
data:{labels:[],datasets:[{label:'P/L',data:[]}]}
})

let pieChart=new Chart(document.getElementById("pieChart"),{
type:'pie',
data:{labels:['Wins','Losses'],datasets:[{data:[0,0]}]}
})

function updateCharts(pnlArray,equityArray){

equityChart.data.labels=equityArray.map((_,i)=>i+1)
equityChart.data.datasets[0].data=equityArray
equityChart.update()

barChart.data.labels=pnlArray.map((_,i)=>"Trade "+(i+1))
barChart.data.datasets[0].data=pnlArray
barChart.update()

pieChart.data.datasets[0].data=[wins,losses]
pieChart.update()

}

renderTrades()

</script>

</body>
  </html>
